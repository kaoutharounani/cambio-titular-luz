<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente de Cambio de Titular de Luz – papernest</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

    :root {
      --primary: #5A52FF;
      --primary-light: #EEEDff;
      --primary-dark: #3f38cc;
      --green: #0FC4B2;
      --green-light: #E7F9F7;
      --yellow: #FFB81D;
      --yellow-light: #FFF7E8;
      --text: #000000;
      --text-muted: #63697F;
      --bg: #F7F7F9;
      --white: #FFFFFF;
      --border: #E2E4EA;
      --error: #DC2626;
      --success: #16A34A;
      --radius: 18px 5px 18px 5px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(90,82,255,0.10);
      --shadow-lg: 0 8px 40px rgba(90,82,255,0.16);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', 'Avenir', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ── Header ── */
    .wizard-header {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
    }

    .logo-wrap svg { height: 32px; width: auto; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 4px;
    }

    .badge svg { width: 14px; height: 14px; }

    h1 {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 800;
      text-align: center;
      line-height: 1.25;
    }

    h1 span { color: var(--primary); }

    .subtitle {
      font-size: 16px;
      color: var(--text-muted);
      text-align: center;
      max-width: 480px;
      line-height: 1.5;
    }

    /* ── Card ── */
    .wizard-card {
      width: 100%;
      max-width: 680px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      position: relative;
    }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--border);
      height: 4px;
      width: 100%;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--green));
      transition: width .45s cubic-bezier(.4,0,.2,1);
    }

    /* ── Step indicator ── */
    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 32px 0;
    }

    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background .3s, transform .3s;
    }

    .step-dot.active {
      background: var(--primary);
      transform: scale(1.4);
    }

    .step-dot.done {
      background: var(--green);
    }

    /* ── Step content ── */
    .step-body {
      padding: 32px 40px 40px;
      animation: fadeSlide .35s ease both;
    }

    @media(max-width: 520px) {
      .step-body { padding: 24px 20px 32px; }
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .step-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .step-question {
      font-size: clamp(18px, 4vw, 22px);
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 24px;
    }

    /* ── Option cards ── */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .option-card {
      border: 2px solid var(--border);
      border-radius: 15px 5px 15px 5px;
      padding: 20px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s, background .2s, transform .15s;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--white);
      text-align: left;
    }

    .option-card:hover {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
      transform: translateY(-2px);
    }

    .option-card.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .option-icon {
      flex-shrink: 0;
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: var(--bg);
    }

    .option-card.selected .option-icon { background: var(--primary); }

    .option-text {}
    .option-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .option-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

    /* ── Result panel ── */
    .result-wrap {
      animation: fadeSlide .35s ease both;
    }

    .result-header {
      background: linear-gradient(135deg, var(--primary) 0%, #7b75ff 100%);
      padding: 28px 40px;
      color: white;
    }

    @media(max-width: 520px) {
      .result-header { padding: 24px 20px; }
    }

    .result-header .scenario-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .result-header h2 {
      font-size: clamp(18px,4vw,22px);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .result-header p {
      font-size: 14px;
      opacity: .85;
      line-height: 1.5;
    }

    /* ── Info pills ── */
    .info-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 24px 40px 0;
    }

    @media(max-width: 520px) {
      .info-pills { padding: 20px 20px 0; }
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
    }

    .pill-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .pill-icon.blue  { background: #EEEDff; }
    .pill-icon.green { background: var(--green-light); }
    .pill-icon.yellow { background: var(--yellow-light); }

    .pill-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; display: block; }
    .pill-value { font-size: 15px; font-weight: 700; display: block; }

    /* ── Documents section ── */
    .docs-section {
      padding: 24px 40px;
    }

    @media(max-width: 520px) {
      .docs-section { padding: 20px; }
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .doc-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .doc-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--bg);
      border-radius: 12px;
      padding: 14px 16px;
      transition: background .2s;
    }

    .doc-item:hover { background: var(--primary-light); }

    .doc-check {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-top: 1px;
    }

    .doc-check.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .doc-check.checked::after {
      content: '';
      width: 10px; height: 6px;
      border-left: 2px solid white;
      border-bottom: 2px solid white;
      transform: rotate(-45deg) translateY(-2px);
      display: block;
    }

    .doc-info { flex: 1; }
    .doc-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .doc-note { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

    .doc-req {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      margin-top: 2px;
    }

    .doc-req.obligatorio { background: #FEE2E2; color: var(--error); }
    .doc-req.opcional    { background: var(--green-light); color: #0a8a7c; }

    /* ── Steps section ── */
    .steps-section {
      padding: 0 40px 24px;
    }

    @media(max-width: 520px) {
      .steps-section { padding: 0 20px 20px; }
    }

    .step-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step-row {
      display: flex;
      gap: 16px;
      position: relative;
    }

    .step-line-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      width: 32px;
    }

    .step-num {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      z-index: 1;
    }

    .step-connector {
      flex: 1;
      width: 2px;
      background: var(--border);
      margin: 4px 0;
      min-height: 20px;
    }

    .step-row:last-child .step-connector { display: none; }

    .step-content {
      padding: 4px 0 20px;
      flex: 1;
    }

    .step-content-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .step-content-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    /* ── Deuda warning ── */
    .deuda-box {
      margin: 0 40px 24px;
      background: var(--yellow-light);
      border: 1.5px solid var(--yellow);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    @media(max-width: 520px) {
      .deuda-box { margin: 0 20px 20px; }
    }

    .deuda-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .deuda-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .deuda-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    /* ── CTA section ── */
    .cta-section {
      background: var(--bg);
      padding: 24px 40px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    @media(max-width: 520px) {
      .cta-section { padding: 20px; }
    }

    .cta-section p {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--primary);
      color: white;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      padding: 14px 32px;
      border: none;
      border-radius: 18px 5px 18px 5px;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      text-decoration: none;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 14px rgba(90,82,255,.35);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(90,82,255,.4);
    }

    .btn-restart {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
      padding: 4px;
    }

    .btn-restart:hover { color: var(--primary); }

    /* ── Nav buttons ── */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
      gap: 12px;
    }

    .btn-back {
      background: none;
      border: 2px solid var(--border);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }

    .btn-back:hover { border-color: var(--primary); color: var(--primary); }

    .btn-next {
      background: var(--primary);
      color: white;
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 18px 5px 18px 5px;
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-left: auto;
      opacity: .5;
      pointer-events: none;
    }

    .btn-next.active {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-next.active:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    /* ── Trustpilot strip ── */
    .trust-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .stars { color: #FFB81D; letter-spacing: 1px; font-size: 14px; }

    /* Responsive */
    @media(max-width: 420px) {
      .options-grid { grid-template-columns: 1fr; }
    }

    /* ── Progress text ── */
    .progress-text {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      padding: 8px 16px 0;
    }
  </style>
</head>

function render() {

    card.innerHTML = renderResult();
  } else {
    card.innerHTML = renderStep();
  }
  attachEvents();
}

function progressPct() {
  return Math.round((state.step / TOTAL_STEPS) * 100);
}

function dotsHtml() {

    const cls = i < state.step ? 'done' : i === state.step ? 'active' : '';
    return `<div class="step-dot ${cls}"></div>`;
  }).join('');
}

  } else if (state.step === 1) {
    questionHtml = `
      <div class="step-label">Paso 2 de 3</div>
      <div class="step-question">¿El contrato actual tiene deudas pendientes?</div>
      <div class="options-grid" style="grid-template-columns:1fr 1fr 1fr">
        ${COMPANIA_TIENE.map(m => `
          <div class="option-card ${state.deuda === m.id ? 'selected' : ''}" data-type="deuda" data-value="${m.id}">
            <div class="option-icon">${m.icon}</div>
            <div class="option-text">
              <div class="option-title">${m.title}</div>
              <div class="option-desc">${m.desc}</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  } else if (state.step === 2) {
    const disabled = state.deuda === 'no';
    questionHtml = `
      <div class="step-label">Paso 3 de 3</div>
      <div class="step-question">¿Qué método prefieres para el cambio?</div>
      <div class="options-grid">
        ${METODO.map(m => {
          const isDisabled = m.id === 'traspaso' && disabled;
          return `
            <div class="option-card ${state.metodo === m.id ? 'selected' : ''} ${isDisabled ? 'option-disabled' : ''}"
                 data-type="metodo" data-value="${m.id}" ${isDisabled ? 'data-disabled="true"' : ''}>
              <div class="option-icon">${m.icon}</div>
              <div class="option-text">
                <div class="option-title">${m.title} ${isDisabled ? '<span style="font-size:11px;color:#DC2626;font-weight:600">(no disponible con deudas)</span>' : ''}</div>
                <div class="option-desc">${m.desc}</div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  const isNextActive = (state.step === 0 && state.motivo) ||
                       (state.step === 1 && state.deuda) ||
                       (state.step === 2 && state.metodo);

  return `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="step-indicator">${dotsHtml()}</div>
    <div class="step-body">
      ${questionHtml}
      <div class="nav-row">
        ${state.step > 0
          ? `<button class="btn-back" id="btnBack">← Atrás</button>`
          : `<div></div>`}
        <button class="btn-next ${isNextActive ? 'active' : ''}" id="btnNext">
          ${state.step < TOTAL_STEPS - 1 ? 'Siguiente →' : 'Ver mi guía personalizada →'}
        </button>
      </div>
    </div>
  `;
}

function renderResult() {
  const r = getResult(state.motivo, state.deuda, state.metodo);
  if (!r) return '<p>Error al obtener resultados.</p>';

  const docsHtml = r.docs.map((d, i) => `
    <li class="doc-item">
      <div class="doc-check" data-idx="${i}" id="chk-${i}"></div>
      <div class="doc-info">
        <div class="doc-name">${d.name}</div>
        <div class="doc-note">${d.note}</div>
      </div>
      <span class="doc-req ${d.req}">${d.req === 'obligatorio' ? 'Obligatorio' : 'Opcional'}</span>
    </li>
  `).join('');

  const stepsHtml = r.steps.map((s, i) => `
    <li class="step-row">
      <div class="step-line-wrap">
        <div class="step-num">${i + 1}</div>
        <div class="step-connector"></div>
      </div>
      <div class="step-content">
        <div class="step-content-title">${s.title}</div>
        <div class="step-content-desc">${s.desc}</div>
      </div>
    </li>
  `).join('');

  const deudaWarn = r.deuda_warn ? `
    <div class="deuda-box">
      <div class="deuda-icon">⚠️</div>
      <div>
        <div class="deuda-title">Atención: situación con deudas</div>
        <div class="deuda-text">${r.deuda_warn.replace('⚠️ ', '')}</div>
      </div>
    </div>
  ` : '';

  return `
    <div class="result-wrap">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:100%"></div></div>

      <div class="result-header">
        <div class="scenario-badge">${r.emoji} ${r.label}</div>
        <h2>${r.title}</h2>
        <p>${r.desc}</p>
      </div>

      <div class="info-pills">
        <div class="pill">
          <div class="pill-icon blue">⏱️</div>
          <div>
            <span class="pill-label">Plazo</span>
            <span class="pill-value">${r.plazo}</span>
          </div>
        </div>
        <div class="pill">
          <div class="pill-icon green">💶</div>
          <div>
            <span class="pill-label">Coste</span>
            <span class="pill-value">${r.coste}</span>
          </div>
        </div>
        <div class="pill">
          <div class="pill-icon yellow">🔄</div>
          <div>
            <span class="pill-label">Método recomendado</span>
            <span class="pill-value">${r.metodo_rec}</span>
          </div>
        </div>
      </div>

      ${deudaWarn}

      <div class="docs-section">
        <div class="section-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Documentos necesarios — marca los que ya tienes
        </div>
        <ul class="doc-list">${docsHtml}</ul>
      </div>

      <div class="steps-section">
        <div class="section-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Pasos a seguir
        </div>
        <ul class="step-list">${stepsHtml}</ul>
      </div>

      <div class="cta-section">
        <p>¿Prefieres que papernest gestione el cambio por ti? <strong>Sin coste adicional</strong> y en un solo paso.</p>
        <a href="tel:919014228" class="btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          Llamar al 919 014 228
        </a>
        <div class="trust-strip">
          <span class="stars">★★★★★</span>
          <span>4,6/5 en Trustpilot · +1M clientes · Servicio gratuito</span>
        </div>
        <button class="btn-restart" id="btnRestart">Empezar de nuevo</button>
      </div>
    </div>
  `;
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────

function attachEvents() {
  // Option cards
  document.querySelectorAll('.option-card').forEach(card => {
    card.addEventListener('click', () => {
      if (card.dataset.disabled) return;
      const type = card.dataset.type;
      const val  = card.dataset.value;
      state[type] = val;

      // If deuda = 'no' and metodo was traspaso, reset metodo
      if (type === 'deuda' && val === 'no' && state.metodo === 'traspaso') {
        state.metodo = null;
      }

      render();
    });
  });

  // Next
  const btnNext = document.getElementById('btnNext');
  if (btnNext) {
    btnNext.addEventListener('click', () => {
      if (!btnNext.classList.contains('active')) return;
      state.step++;
      render();
      document.getElementById('wizardCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }

  // Back
  const btnBack = document.getElementById('btnBack');
  if (btnBack) {
    btnBack.addEventListener('click', () => {
      state.step--;
      render();
    });
  }

  // Restart
  const btnRestart = document.getElementById('btnRestart');
  if (btnRestart) {
    btnRestart.addEventListener('click', () => {
      state = { step: 0, motivo: null, deuda: null, metodo: null };
      render();
      document.getElementById('wizardCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }

  // Doc checkboxes
  document.querySelectorAll('.doc-check').forEach(chk => {
    chk.addEventListener('click', () => {
      chk.classList.toggle('checked');
    });
  });

  // Disabled option styling
  document.querySelectorAll('.option-card[data-disabled]').forEach(card => {
    card.style.opacity = '0.45';
    card.style.cursor = 'not-allowed';
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
